<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Need a Movie Rec?</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="poster-wall" id="poster-wall" aria-hidden="true"></div>

    <main class="theater-shell">
      <div class="account-corner">
        <button class="account-button" id="account-button" type="button">
          Login / Create Account
        </button>
      </div>

      <section class="marquee" aria-labelledby="site-title">
        <h1 class="marquee-title" id="site-title">Need a Rec?</h1>
      </section>

      <div class="stage-stack">
        <section class="mood-section" aria-labelledby="mood-title">
          <h2 id="mood-title">What's your movie mood?</h2>

          <div class="poster-grid" id="poster-grid" aria-live="polite"></div>

          <button class="pick-search-button" id="pick-search-button" type="button">
            Search based on picks
          </button>

          <p class="tmdb-credit">
            This product uses the TMDB API but is not endorsed or certified by TMDB.
          </p>
        </section>

        <section class="genre-section" aria-labelledby="genre-title">
          <h2 id="genre-title">Search by genre or actor</h2>
          <form class="genre-actor-form" id="genre-actor-form">
            <label class="sr-only" for="genre-actor-input">Genre or actor</label>
            <input
              id="genre-actor-input"
              name="genreActor"
              type="search"
              autocomplete="off"
              placeholder="Try neo-noir, Florence Pugh, road trip..."
            >
            <button type="submit">Search</button>
          </form>
        </section>

        <section class="chat-panel" aria-labelledby="chat-title">
          <header class="chat-header">
            <h2 id="chat-title">Chat with us</h2>
            <span class="status-pill" id="status-pill">Ready</span>
          </header>

          <div class="messages" id="messages" aria-live="polite">
            <article class="message message-bot">
              <div class="avatar">M</div>
              <div class="bubble">
                <p>What kind of movie would you like tonight?</p>
              </div>
            </article>
          </div>

          <form class="composer" id="chat-form">
            <label class="sr-only" for="message-input">Movie request</label>
            <textarea
              id="message-input"
              name="message"
              rows="2"
              placeholder="I want a smart sci-fi thriller under two hours..."
              required
            ></textarea>
            <button type="submit">Send</button>
          </form>
        </section>
      </div>
    </main>

    <div class="movie-search-modal" id="movie-search-modal" hidden>
      <section
        class="movie-search-popover"
        role="dialog"
        aria-modal="true"
        aria-labelledby="movie-search-title"
      >
        <div class="movie-search-topline">
          <h2 id="movie-search-title">Pick a movie</h2>
          <button
            class="movie-search-close"
            id="movie-search-close"
            type="button"
            aria-label="Close movie search"
          >x</button>
        </div>

        <div class="movie-search">
          <label for="movie-search-input">Movie title</label>
          <div class="search-box">
            <input
              id="movie-search-input"
              type="search"
              autocomplete="off"
              placeholder="Start typing..."
              aria-autocomplete="list"
              aria-controls="movie-results"
              aria-expanded="false"
            >
            <ul class="movie-results" id="movie-results" role="listbox" hidden></ul>
          </div>
          <p class="search-status" id="movie-search-status" role="status"></p>
        </div>
      </section>
    </div>

    <div class="related-results-modal" id="related-results-modal" hidden>
      <section
        class="related-results-popover"
        role="dialog"
        aria-modal="true"
        aria-labelledby="related-results-title"
      >
        <div class="related-results-topline">
          <h2 id="related-results-title">Movie matches</h2>
          <button
            class="related-results-close"
            id="related-results-close"
            type="button"
            aria-label="Close movie matches"
          >x</button>
        </div>

        <p class="related-results-status" id="related-results-status" role="status"></p>
        <div class="related-results-grid" id="related-results-grid"></div>
      </section>
    </div>

    <div class="account-modal" id="account-modal" hidden>
      <section
        class="account-popover"
        role="dialog"
        aria-modal="true"
        aria-labelledby="account-title"
      >
        <div class="account-topline">
          <h2 id="account-title">Account</h2>
          <button
            class="account-close"
            id="account-close"
            type="button"
            aria-label="Close account"
          >x</button>
        </div>

        <div class="account-panel" id="account-signed-out">
          <div class="account-tabs" role="tablist" aria-label="Account action">
            <button
              class="account-tab is-active"
              id="account-login-tab"
              type="button"
              role="tab"
              aria-selected="true"
              data-auth-mode="login"
            >Login</button>
            <button
              class="account-tab"
              id="account-register-tab"
              type="button"
              role="tab"
              aria-selected="false"
              data-auth-mode="register"
            >Create Account</button>
          </div>

          <form class="account-form" id="account-form">
            <label for="account-username">Username</label>
            <input
              id="account-username"
              name="username"
              type="text"
              autocomplete="username"
              required
            >

            <label data-register-only for="account-display-name">Display name</label>
            <input
              data-register-only
              id="account-display-name"
              name="displayName"
              type="text"
              autocomplete="name"
            >

            <label for="account-password">Password</label>
            <input
              id="account-password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            >

            <label data-register-only for="account-invite-code">Invite code</label>
            <input
              data-register-only
              id="account-invite-code"
              name="inviteCode"
              type="text"
              autocomplete="off"
            >

            <button class="account-submit" id="account-submit" type="submit">
              Login
            </button>
          </form>

          <p class="account-status" id="account-status" role="status"></p>
        </div>

        <div class="account-panel account-signed-in" id="account-signed-in" hidden>
          <p class="account-greeting" id="account-greeting"></p>
          <button class="account-logout-button" id="account-logout-button" type="button">
            Log out
          </button>
          <p class="account-status" id="account-profile-status" role="status"></p>
        </div>
      </section>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
